<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pub Quiz">
<link rel="apple-touch-icon" href="../../icon.svg">
<title>Sun\u010dev Sistem</title>
<style>
:root {
  --pub-bg: #1a0f05;
  --pub-surface: #241508;
  --gold: #c9a227;
  --gold2: #e8c84a;
  --text: #f0e6d0;
  --text2: #b89a70;
  --border: #4a3010;
  --hover: #3a2010;
  --space: #020818;
  --space2: #050f25;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--pub-bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--pub-surface);
  border-bottom: 2px solid var(--gold);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-back {
  color: var(--gold);
  text-decoration: none;
  font-size: 14px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  white-space: nowrap;
  transition: background 0.2s;
}
.header-back:hover { background: var(--hover); }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 24px; color: var(--gold2); letter-spacing: 2px; }
.header-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* SPACE SECTION */
.space-section {
  background: var(--space);
  position: relative;
  overflow: hidden;
}
#starfield {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ORRERY */
.orrery-wrap {
  overflow-x: auto;
  padding: 30px 40px 20px;
  position: relative;
  z-index: 1;
  scrollbar-color: var(--gold) var(--space2);
  scrollbar-width: thin;
}
.orrery {
  display: flex;
  align-items: center;
  gap: 0;
  min-width: max-content;
  padding: 10px 0 30px;
}

/* SUN */
.sun-wrap {
  display: flex;
  align-items: center;
  flex-direction: column;
  cursor: pointer;
  margin-right: 50px;
  flex-shrink: 0;
}
.sun-body {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #fff7c0, #ffd700, #ff8c00, #cc5500);
  box-shadow: 0 0 40px 15px rgba(255,180,0,0.5), 0 0 80px 30px rgba(255,120,0,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.sun-wrap:hover .sun-body {
  transform: scale(1.08);
  box-shadow: 0 0 60px 25px rgba(255,200,0,0.7), 0 0 120px 50px rgba(255,120,0,0.35);
}
.sun-wrap.selected .sun-body {
  box-shadow: 0 0 60px 25px rgba(255,200,0,0.8), 0 0 0 4px var(--gold2), 0 0 0 8px rgba(232,200,74,0.3);
}

/* PLANET SLOT */
.planet-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 0 20px;
  position: relative;
  flex-shrink: 0;
  min-width: 80px;
}
.planet-slot .orbit-line {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 1px;
  background: rgba(100,150,200,0.1);
  transform: translateY(-50%);
  z-index: 0;
}

.planet-body-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}
.planet-body {
  border-radius: 50%;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s;
}
.planet-slot:hover .planet-body {
  transform: scale(1.2);
}
.planet-slot.selected .planet-body {
  outline: 3px solid var(--gold2);
  outline-offset: 4px;
}

/* Saturn rings */
.saturn-ring-outer {
  position: absolute;
  border-radius: 50%;
  border: 6px solid rgba(200, 170, 100, 0.55);
  pointer-events: none;
}
.saturn-ring-inner {
  position: absolute;
  border-radius: 50%;
  border: 4px solid rgba(180, 150, 80, 0.35);
  pointer-events: none;
}

/* Planet label */
.planet-label {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  letter-spacing: 0.5px;
  transition: color 0.2s;
  white-space: nowrap;
}
.planet-slot:hover .planet-label,
.planet-slot.selected .planet-label { color: var(--gold2); }
.sun-wrap .planet-label { color: #ffd700; font-size: 13px; }

.planet-dist {
  font-size: 10px;
  color: rgba(150,170,220,0.5);
  margin-bottom: 8px;
  text-align: center;
}

/* Belt */
.belt {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 10px;
  flex-shrink: 0;
  opacity: 0.4;
}
.belt-dots {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 8px;
}
.belt-dots span {
  display: block;
  width: 2px;
  height: 2px;
  background: #aaa;
  border-radius: 50%;
  margin: 0 auto;
}
.belt-dots span:nth-child(odd) { margin-left: 4px; }
.belt-dots span:nth-child(3n) { margin-right: 6px; }
.belt-label {
  font-size: 9px;
  color: #888;
  writing-mode: vertical-rl;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* HOVER TOOLTIP */
.tooltip {
  position: fixed;
  background: rgba(5,15,35,0.95);
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);
  pointer-events: none;
  z-index: 1000;
  max-width: 220px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.8);
  display: none;
}
.tooltip h4 { color: var(--gold2); font-size: 14px; margin-bottom: 6px; }
.tooltip p { color: var(--text2); font-size: 12px; line-height: 1.5; }
.tooltip strong { color: var(--text); }

/* DETAIL PANEL */
.detail-section {
  background: var(--pub-bg);
  border-top: 2px solid var(--gold);
  padding: 30px 30px;
}
.detail-inner {
  max-width: 1100px;
  margin: 0 auto;
}
.detail-placeholder {
  text-align: center;
  color: var(--text2);
  padding: 40px;
  font-size: 15px;
  font-style: italic;
}
.detail-grid {
  display: grid;
  grid-template-columns: 160px 1fr 1fr;
  gap: 30px;
  align-items: start;
}
@media (max-width: 800px) {
  .detail-grid { grid-template-columns: 1fr 1fr; }
  .detail-visual { display: none; }
  .detail-section { padding: 20px 16px; }
}
@media (max-width: 500px) {
  .detail-grid { grid-template-columns: 1fr; gap: 18px; }
  .header { padding: 10px 12px; gap: 10px; }
  .header-title h1 { font-size: 18px; letter-spacing: 1px; }
  .orrery-wrap { padding: 16px 16px 10px; }
  .sun-wrap { margin-right: 24px; }
  .sun-body { width: 60px; height: 60px; }
  .planet-slot { padding: 0 10px; min-width: 56px; }
  .detail-section { padding: 16px 12px; }
  .stat-row { font-size: 12px; }
  .sats-section h3, .stats-section h3 { font-size: 12px; }
}

/* Visual planet in detail */
.detail-visual {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.detail-planet-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 130px;
  height: 130px;
}
.detail-planet {
  border-radius: 50%;
  transition: transform 0.3s;
}
.detail-planet:hover { transform: rotate(20deg) scale(1.05); }

.detail-name { color: var(--gold2); font-size: 22px; letter-spacing: 1px; }
.detail-subname { color: var(--text2); font-size: 13px; }
.detail-type {
  display: inline-block;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  background: rgba(201,162,39,0.15);
  border: 1px solid var(--border);
  color: var(--gold);
  margin-top: 4px;
}

/* Stats grid */
.stats-section h3 {
  color: var(--gold);
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  margin-bottom: 14px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(74,48,16,0.4);
  font-size: 13px;
}
.stat-label { color: var(--text2); flex-shrink: 0; }
.stat-val { color: var(--text); text-align: right; }

/* Satellites */
.sats-section h3 {
  color: var(--gold);
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  margin-bottom: 14px;
}
.sat-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.sat-dot {
  border-radius: 50%;
  background: #aaa;
  flex-shrink: 0;
}
.sat-name { color: var(--text); }
.sat-size { color: var(--text2); font-size: 12px; margin-left: auto; }
.no-sats { color: var(--text2); font-style: italic; font-size: 13px; }
.more-sats { color: var(--text2); font-size: 12px; margin-top: 6px; font-style: italic; }

/* Fact box */
.fact-box {
  margin-top: 20px;
  background: rgba(201,162,39,0.08);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  grid-column: 1 / -1;
}
.fact-box strong { color: var(--gold2); }

/* Scroll hint */
.scroll-hint {
  text-align: center;
  font-size: 11px;
  color: rgba(150,170,220,0.4);
  padding: 0 0 8px;
  letter-spacing: 1px;
}
</style>
</head>

// ---- STAR FIELD ----
(function() {
  var canvas = document.getElementById('starfield');
  var W = canvas.width = window.innerWidth;
  var H = canvas.height = 280;
  var ctx = canvas.getContext('2d');
  for (var i = 0; i < 320; i++) {
    var x = Math.random() * W;
    var y = Math.random() * H;
    var r = Math.random() * 1.2;
    var a = Math.random() * 0.8 + 0.1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.fill();
  }
})();

// ---- BUILD ORRERY ----
var orrery = document.getElementById('orrery');

function buildSaturnRings(size) {
  var outer = document.createElement('div');
  outer.className = 'saturn-ring-outer';
  var ow = size * 2.6, oh = size * 0.55;
  outer.style.cssText = 'width:' + ow + 'px;height:' + oh + 'px;margin-left:-' + (ow/2 - size/2) + 'px;margin-top:-' + (oh/2 - size/2) + 'px;';
  var inner = document.createElement('div');
  inner.className = 'saturn-ring-inner';
  var iw = size * 2.1, ih = size * 0.42;
  inner.style.cssText = 'width:' + iw + 'px;height:' + ih + 'px;margin-left:-' + (iw/2 - size/2) + 'px;margin-top:-' + (ih/2 - size/2) + 'px;';
  return [outer, inner];
}

// Sun
var sunWrap = document.createElement('div');
sunWrap.className = 'sun-wrap';
sunWrap.setAttribute('data-id', 'sun');
var sunBody = document.createElement('div');
sunBody.className = 'sun-body';
var sunLabel = document.createElement('div');
sunLabel.className = 'planet-label';
sunLabel.textContent = 'Sunce';
sunWrap.appendChild(sunBody);
sunWrap.appendChild(sunLabel);
orrery.appendChild(sunWrap);

// Belt separator
function makeBelt(label) {
  var b = document.createElement('div');
  b.className = 'belt';
  b.innerHTML = '<div class="belt-dots"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="belt-label">' + label + '</div>';
  return b;
}

var beltAdded = false;
BODIES.slice(1).forEach(function(p) {
  if (!beltAdded && (p.id === 'jupiter')) {
    orrery.appendChild(makeBelt('Asteroidski pojas'));
    beltAdded = true;
  }
  if (p.id === 'pluton') {
    orrery.appendChild(makeBelt('Kuiperov pojas'));
  }

  var slot = document.createElement('div');
  slot.className = 'planet-slot';
  slot.setAttribute('data-id', p.id);

  var distLabel = document.createElement('div');
  distLabel.className = 'planet-dist';
  distLabel.textContent = p.au || '';

  var bodyWrap = document.createElement('div');
  bodyWrap.className = 'planet-body-wrap';

  var body = document.createElement('div');
  body.className = 'planet-body';
  var s = p.displaySize;
  body.style.cssText = 'width:' + s + 'px;height:' + s + 'px;background:' + p.color + ';box-shadow:' + p.glow + ';';

  if (p.bands) {
    body.style.background = 'linear-gradient(180deg, #e8c880 0%, #c89050 15%, #e0b860 30%, #b07030 45%, #c89050 60%, #d8b060 75%, #b07030 90%, #c89050 100%)';
    body.style.borderRadius = '50%';
  }

  bodyWrap.appendChild(body);

  if (p.rings) {
    var rings = buildSaturnRings(s);
    rings.forEach(function(r) { bodyWrap.appendChild(r); });
  }

  var label = document.createElement('div');
  label.className = 'planet-label';
  label.textContent = p.name + (p.isDwarf ? ' *' : '');

  slot.appendChild(distLabel);
  slot.appendChild(bodyWrap);
  slot.appendChild(label);
  orrery.appendChild(slot);
});

// Dwarf planet note

note.style.cssText = 'color:rgba(150,170,200,0.4);font-size:10px;text-align:center;padding:4px 0 0 0;letter-spacing:0.5px;';
note.textContent = '* patulja\u0161ta planeta';
document.querySelector('.orrery-wrap').appendChild(note);

// ---- TOOLTIP ----
var tooltip = document.getElementById('tooltip');

function showTooltip(e, p) {
  var html = '<h4>' + p.name + ' <span style="color:var(--text2);font-size:11px;font-weight:normal;">' + p.latin + '</span></h4>';
  html += '<p><strong>Tip:</strong> ' + p.type + '</p>';
  if (p.dist) html += '<p><strong>Udaljenost:</strong> ' + p.dist + '</p>';
  if (p.satTotal !== undefined) html += '<p><strong>Satelita:</strong> ' + p.satTotal + '</p>';
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  var x = e.clientX + 14, y = e.clientY - 10;
  if (x + 230 > window.innerWidth) x = e.clientX - 230;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ---- DETAIL PANEL ----
function satDotSize(size) {
  if (size > 4000) return 18;
  if (size > 2000) return 15;
  if (size > 1000) return 12;
  if (size > 400) return 9;
  return 6;
}

function renderDetail(p) {
  var html = '<div class="detail-grid">';

  // Visual
  html += '<div class="detail-visual">';
  var ds = Math.min(p.displaySize * 1.6, 110);
  if (p.isSun) ds = 110;
  html += '<div class="detail-planet-wrap">';
  if (p.rings) {
    var rw = ds * 2.6, rh = ds * 0.55;
    html += '<div style="position:absolute;width:' + rw + 'px;height:' + rh + 'px;border:6px solid rgba(200,170,100,0.55);border-radius:50%;pointer-events:none;"></div>';
    html += '<div style="position:absolute;width:' + (ds*2.1) + 'px;height:' + (ds*0.42) + 'px;border:4px solid rgba(180,150,80,0.35);border-radius:50%;pointer-events:none;"></div>';
  }
  var bg = p.color;
  if (p.bands) bg = 'linear-gradient(180deg,#e8c880 0%,#c89050 15%,#e0b860 30%,#b07030 45%,#c89050 60%,#d8b060 75%,#b07030 90%,#c89050 100%)';
  html += '<div class="detail-planet" style="width:' + ds + 'px;height:' + ds + 'px;background:' + bg + ';box-shadow:' + (p.glow||'') + ';border-radius:50%;"></div>';
  html += '</div>';
  html += '<div class="detail-name">' + p.name + '</div>';
  html += '<div class="detail-subname">' + p.latin + '</div>';
  html += '<div class="detail-type">' + p.type + '</div>';
  html += '</div>';

  // Stats
  html += '<div class="stats-section"><h3>Podaci</h3>';
  p.stats.forEach(function(s) {
    html += '<div class="stat-row"><span class="stat-label">' + s[0] + '</span><span class="stat-val">' + s[1] + '</span></div>';
  });
  html += '</div>';

  // Satellites
  html += '<div class="sats-section"><h3>Sateliti (' + p.satTotal + ')</h3>';
  html += '<div class="sat-list">';
  if (p.sats.length === 0) {
    html += '<div class="no-sats">Nema prirodnih satelita</div>';
  } else {
    p.sats.forEach(function(s) {
      var dotSz = s.dot || satDotSize(s.size);
      html += '<div class="sat-item" title="' + (s.info||'') + '">';
      html += '<div class="sat-dot" style="width:' + dotSz + 'px;height:' + dotSz + 'px;background:' + (s.color||'#aaa') + ';"></div>';
      html += '<span class="sat-name">' + s.name + '</span>';
      html += '<span class="sat-size">\u2205 ' + (s.size > 999 ? (s.size).toLocaleString() : s.size) + ' km</span>';
      html += '</div>';
    });
    if (p.satNote) html += '<div class="more-sats">' + p.satNote + '</div>';
  }
  html += '</div></div>';

  html += '</div>'; // end grid

  // Fact
  html += '<div class="fact-box"><strong>&#9733; Zanimljivo:</strong> ' + p.fact + '</div>';

  document.getElementById('detailPanel').innerHTML = html;
}

// ---- EVENTS ----
var selected = null;

function selectBody(id) {
  document.querySelectorAll('.planet-slot, .sun-wrap').forEach(function(el) {
    el.classList.remove('selected');
  });
  var target = document.querySelector('[data-id="' + id + '"]');
  if (target) target.classList.add('selected');
  selected = id;
  var p = BODIES.find(function(b) { return b.id === id; });
  if (p) renderDetail(p);
  document.querySelector('.detail-section').scrollIntoView({behavior:'smooth', block:'nearest'});
}

document.querySelectorAll('.planet-slot, .sun-wrap').forEach(function(el) {
  var id = el.getAttribute('data-id');
  var p = BODIES.find(function(b) { return b.id === id; });
  if (!p) return;

  el.addEventListener('mouseenter', function(e) { showTooltip(e, p); });
  el.addEventListener('mousemove', function(e) { moveTooltip(e); });
  el.addEventListener('mouseleave', hideTooltip);
  el.addEventListener('click', function() {
    hideTooltip();
    selectBody(id);
  });
});

// Default: show Earth
selectBody('zemlja');
</script>
