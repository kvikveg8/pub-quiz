<style>
:root {
  --bg: #1a0f05;
  --surface: #241508;
  --surface2: #2e1c0a;
  --surface3: #3a2410;
  --gold: #c9a227;
  --gold2: #e8c84a;
  --text: #f0e6d0;
  --text2: #b89a70;
  --border: #3a2a12;
  --border2: #4a3518;
  --hover: #3a2010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 2px solid var(--gold);
  padding: 16px 24px;
  display: flex; align-items: center; gap: 20px;
  position: sticky; top: 0; z-index: 100;
}
.header-back { color: var(--gold); text-decoration: none; font-size: 14px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; white-space: nowrap; transition: background 0.2s; }
.header-back:hover { background: var(--hover); }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 24px; color: var(--gold2); letter-spacing: 2px; }
.header-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.controls {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.search-box {
  flex: 1; min-width: 180px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 14px; color: var(--text);
  font-family: Georgia, serif; font-size: 14px; outline: none;
}
.search-box:focus { border-color: var(--gold); }
.search-box::placeholder { color: var(--text2); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-label { color: var(--text2); font-size: 12px; align-self: center; text-transform: uppercase; letter-spacing: 1px; }
.filter-btn {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text2); padding: 6px 12px; font-family: Georgia, serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: bold; }

.main { padding: 24px; max-width: 1100px; margin: 0 auto; }
.results-count { color: var(--text2); font-size: 13px; margin-bottom: 20px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; transition: border-color 0.2s, box-shadow 0.2s; position: relative;
}
.card:hover { border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,162,39,0.15); }
.card.cancelled { opacity: 0.6; border-style: dashed; }
.card.future { border-color: var(--gold); background: #1e1500; }
.card.zimska { background: #050e18; border-color: #1a3050; }
.card.zimska:hover { border-color: #4090c0; box-shadow: 0 2px 12px rgba(64,144,192,0.2); }
.card.zimska.future { border-color: #4090c0; background: #040c18; }
.card.zimska.cancelled { border-color: #1a3050; }

.card-year { font-size: 28px; font-weight: bold; color: var(--gold2); line-height: 1; }
.card.zimska .card-year { color: #80c8f0; }
.card-city { font-size: 18px; color: var(--text); margin: 4px 0 2px; font-weight: bold; }
.card-country { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tag {
  font-size: 10px; padding: 2px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.tag-eu  { background: #1a2040; color: #80a0e0; border: 1px solid #2a3060; }
.tag-am  { background: #102018; color: #70b070; border: 1px solid #1a4020; }
.tag-as  { background: #201008; color: #c09050; border: 1px solid #402010; }
.tag-oc  { background: #081820; color: #60b0c0; border: 1px solid #103040; }
.tag-off { background: #201010; color: #c05050; border: 1px solid #401010; }
.tag-fut { background: #1a1600; color: var(--gold); border: 1px solid var(--gold); }
.tag-let { background: #201408; color: #e08848; border: 1px solid #402010; }
.tag-zim { background: #04121e; color: #60b0e0; border: 1px solid #103050; }
.card-fact { font-size: 12px; color: var(--text2); line-height: 1.5; }
.card-athletes { font-size: 11px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

.no-results { text-align: center; color: var(--text2); padding: 60px 20px; font-size: 16px; }

@media (max-width: 600px) {
  .main { padding: 14px; }
  .controls { padding: 10px 14px; }
  .header-title h1 { font-size: 18px; }
  .grid { grid-template-columns: 1fr; }
}
</style>

var state = { season: "all", cat: "all", search: "" };

function getData() {
  if (state.season === "letnje") return LETNJE.map(function(d){ return d; });
  if (state.season === "zimske") return ZIMSKE.map(function(d){ return d; });
  var letnje = LETNJE.map(function(d){ return Object.assign({}, d, {_season:"letnje"}); });
  var zimske = ZIMSKE.map(function(d){ return Object.assign({}, d, {_season:"zimske"}); });
  return letnje.concat(zimske).sort(function(a, b){ return a.year - b.year; });
}

function getItems() {
  var items = getData();
  if (state.cat !== "all") items = items.filter(function(d){ return d.cat === state.cat; });
  if (state.search) {
    var q = state.search.toLowerCase();
    items = items.filter(function(d){
      return String(d.year).includes(q) || d.city.toLowerCase().includes(q) || d.country.toLowerCase().includes(q) || d.fact.toLowerCase().includes(q);
    });
  }
  return items;
}

  document.getElementById("subtitle").textContent = SUBTITLE[state.season] || SUBTITLE.all;
  var items = getItems();
  var countLabel = state.season === "all" ? " olimpijada" : state.season === "zimske" ? " zimske olimpijada" : " letnje olimpijada";
  document.getElementById("resultsCount").textContent = items.length + countLabel;
  var grid = document.getElementById("grid");
  if (!items.length) { grid.innerHTML = "<div class=\"no-results\">\u2606 Nema rezultata.</div>"; return; }
  var html = "";
  for (var i = 0; i < items.length; i++) {
    var d = items[i];
    var isZimska = (state.season === "zimske") || (d._season === "zimske");
    var cls = "card" + (d.cat === "OFF" ? " cancelled" : "") + (d.future ? " future" : "") + (isZimska ? " zimska" : "");
    var tc = TAG_CLS[d.cat] || "";
    var tl = TAG_LBL[d.cat] || "";
    html += "<div class=\"" + cls + "\">";
    html += "<div class=\"card-year\">" + d.year + (d.future ? " \u23f3" : "") + "</div>";
    html += "<div class=\"card-city\">" + (d.cat === "OFF" ? "\u2014" : d.city) + "</div>";
    html += "<div class=\"card-country\">" + (d.cat === "OFF" ? "Nije odr\u017eano" : d.country) + "</div>";
    html += "<div class=\"card-tags\">";
    if (state.season === "all") {
      html += isZimska
        ? "<span class=\"tag tag-zim\">\u2744\ufe0f Zimske</span>"
        : "<span class=\"tag tag-let\">\u2600\ufe0f Letnje</span>";
    }
    html += "<span class=\"tag " + tc + "\">" + tl + "</span></div>";
    html += "<div class=\"card-fact\">" + d.fact + "</div>";
    if (d.athletes > 0) html += "<div class=\"card-athletes\">\ud83d\udc64 " + d.athletes.toLocaleString() + " sportista &nbsp;\u00b7&nbsp; \ud83c\udfc5 " + d.sports + " sportova</div>";
    html += "</div>";
  }
  grid.innerHTML = html;
}

document.getElementById("searchBox").addEventListener("input", function(){ state.search = this.value.trim(); render(); });

document.querySelectorAll("[data-season]").forEach(function(btn){
  btn.addEventListener("click", function(){
    state.season = this.getAttribute("data-season");
    document.querySelectorAll("[data-season]").forEach(function(b){ b.classList.remove("active"); });
    this.classList.add("active");
    render();
  });
});

document.querySelectorAll("[data-cat]").forEach(function(btn){
  btn.addEventListener("click", function(){
    state.cat = this.getAttribute("data-cat");
    document.querySelectorAll("[data-cat]").forEach(function(b){ b.classList.remove("active"); });
    this.classList.add("active");
    render();
  });
});
render();
</script>
</body>
</html>
