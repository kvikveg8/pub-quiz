<meta name="apple-mobile-web-app-title" content="Pub Quiz">

<style>
:root {
  --bg: #1a0f05; --surface: #241508; --surface2: #2e1c0a; --surface3: #3a2410;
  --gold: #c9a227; --gold2: #e8c84a;
  --text: #f0e6d0; --text2: #b89a70;
  --border: #3a2a12; --hover: #3a2010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; }

header { background: var(--surface); border-bottom: 2px solid var(--gold); padding: 16px 24px; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 100; }
.header-back { color: var(--gold); text-decoration: none; font-size: 14px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; transition: background 0.2s; }
.header-back:hover { background: var(--hover); }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 24px; color: var(--gold2); letter-spacing: 2px; }
.header-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.search-box { flex: 1; min-width: 180px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; color: var(--text); font-family: Georgia, serif; font-size: 14px; outline: none; }
.search-box:focus { border-color: var(--gold); }
.search-box::placeholder { color: var(--text2); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-label { color: var(--text2); font-size: 12px; align-self: center; text-transform: uppercase; letter-spacing: 1px; }
.filter-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); padding: 6px 12px; font-family: Georgia, serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: bold; }

.main { padding: 24px; max-width: 1100px; margin: 0 auto; }
.results-count { color: var(--text2); font-size: 13px; margin-bottom: 16px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

.sport-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
.sport-card:hover { border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,162,39,0.15); }
.sport-card.open { border-color: var(--gold); }

.card-head { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.card-emoji { font-size: 28px; width: 44px; text-align: center; flex-shrink: 0; }
.card-info { flex: 1; }
.card-name { font-size: 16px; color: var(--gold2); font-weight: bold; }
.card-since { font-size: 11px; color: var(--text2); margin-top: 2px; }
.card-status {
  font-size: 10px; padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
}
.st-aktivan   { background: #0a2010; color: #70c070; border: 1px solid #1a4020; }
.st-uklonjen  { background: #200a0a; color: #c07070; border: 1px solid #401010; }
.st-privremen { background: #1a1600; color: #c0a030; border: 1px solid #3a3000; }
.arrow-toggle { color: var(--text2); font-size: 14px; transition: transform 0.3s; margin-left: 6px; }
.sport-card.open .arrow-toggle { transform: rotate(180deg); }

.card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.sport-card.open .card-expand { max-height: 500px; }
.card-body { border-top: 1px solid var(--border); padding: 14px 16px; }
.card-desc { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
.card-facts { display: flex; flex-direction: column; gap: 6px; }
.fact-row { display: flex; gap: 8px; font-size: 13px; }
.fact-label { color: var(--text2); min-width: 100px; flex-shrink: 0; }
.fact-val { color: var(--text); }

.cat-tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-right: 4px; }
.cat-vodeni   { background: #081828; color: #60a0d0; border: 1px solid #102840; }
.cat-borba    { background: #1e0808; color: #d07070; border: 1px solid #380808; }
.cat-atletika { background: #081808; color: #70c080; border: 1px solid #103010; }
.cat-ekipni   { background: #180818; color: #c080c0; border: 1px solid #300830; }
.cat-tehnika  { background: #181808; color: #c0c060; border: 1px solid #303008; }
.cat-ostalo   { background: #181818; color: #a0a0a0; border: 1px solid #303030; }

.no-results { text-align: center; color: var(--text2); padding: 60px 20px; font-size: 16px; }

@media (max-width: 600px) {
  .main { padding: 14px; }
  .controls { padding: 10px 14px; }
  .header-title h1 { font-size: 18px; }
  .grid { grid-template-columns: 1fr; }
}
</style>

var state = { st: "all", cat: "all", search: "" };

function getItems() {
  var items = DATA.slice();
  if (state.st !== "all") items = items.filter(function(d){ return d.status === state.st; });
  if (state.cat !== "all") items = items.filter(function(d){ return d.cat === state.cat; });
  if (state.search) {
    var q = state.search.toLowerCase();
    items = items.filter(function(d){
      return d.name.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q);
    });
  }
  return items;
}

var ST_CLS = {aktivan:"st-aktivan", uklonjen:"st-uklonjen", privremen:"st-privremen"};
var ST_LBL = {aktivan:"Aktivan", uklonjen:"Uklonjen", privremen:"Privremen"};

function render() {
  var items = getItems();
  document.getElementById("resultsCount").textContent = items.length + " sporta";
  var grid = document.getElementById("grid");
  if (!items.length) { grid.innerHTML = "<div class=\"no-results\">\u2606 Nema rezultata.</div>"; return; }
  var html = "";
  for (var i = 0; i < items.length; i++) {
    var d = items[i];
    var sc = ST_CLS[d.status] || "";
    var sl = ST_LBL[d.status] || "";
    html += "<div class=\"sport-card\" onclick=\"toggle(this)\">";
    html += "<div class=\"card-head\">";
    html += "<div class=\"card-emoji\">" + d.emoji + "</div>";
    html += "<div class=\"card-info\">";
    html += "<div class=\"card-name\">" + d.name + "</div>";
    html += "<div class=\"card-since\">Na OI od " + d.od + (d.do_ ? " \u2013 " + d.do_ : "") + "</div>";
    html += "</div>";
    html += "<span class=\"card-status " + sc + "\">" + sl + "</span>";
    html += "<span class=\"arrow-toggle\">&#9660;</span>";
    html += "</div>";
    html += "<div class=\"card-expand\"><div class=\"card-body\">";
    html += "<div class=\"card-desc\">" + d.desc + "</div>";
    html += "<div class=\"card-facts\">";
    for (var j = 0; j < d.facts.length; j++) {
      html += "<div class=\"fact-row\"><span class=\"fact-label\">" + d.facts[j].l + "</span><span class=\"fact-val\">" + d.facts[j].v + "</span></div>";
    }
    html += "</div></div></div></div>";
  }
  grid.innerHTML = html;
}

function toggle(card) { card.classList.toggle("open"); }

document.getElementById("searchBox").addEventListener("input", function(){ state.search = this.value.trim(); render(); });
document.querySelectorAll("[data-st]").forEach(function(btn){
  btn.addEventListener("click", function(){
    state.st = this.getAttribute("data-st");
    document.querySelectorAll("[data-st]").forEach(function(b){ b.classList.remove("active"); });
    this.classList.add("active"); render();
  });
});
document.querySelectorAll("[data-cat]").forEach(function(btn){
  btn.addEventListener("click", function(){
    state.cat = this.getAttribute("data-cat");
    document.querySelectorAll("[data-cat]").forEach(function(b){ b.classList.remove("active"); });
    this.classList.add("active"); render();
  });
});
render();
</script>
