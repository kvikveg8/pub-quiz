  header {
    background: var(--surface);
    border-bottom: 2px solid var(--gold);

    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-back {
    color: var(--gold);
    text-decoration: none;
    font-size: 14px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .header-back:hover { background: var(--hover); }
  .header-title { flex: 1; text-align: center; }
  .header-title h1 { font-size: 24px; color: var(--gold2); letter-spacing: 2px; }
  .header-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .oscar-icon { font-size: 28px; }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    outline: none;
  }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text2); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    padding: 6px 12px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: bold; }

  .cat-tabs {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .cat-tab {
    padding: 12px 18px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .cat-tab:hover { color: var(--gold); }
  .cat-tab.active { color: var(--gold2); border-bottom-color: var(--gold); }

  .main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .results-count { color: var(--text2); font-size: 13px; margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr { background: var(--surface); border-bottom: 2px solid var(--gold); }
  th {
    padding: 12px 14px;
    text-align: left;
    color: var(--gold);
    font-weight: normal;
    letter-spacing: 1px;
    font-size: 12px;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--gold2); }
  th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  th.sorted .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--hover); }
  td { padding: 11px 14px; color: var(--text); vertical-align: middle; }
  td.year { color: var(--gold2); font-size: 15px; font-weight: bold; white-space: nowrap; }
  td.winner { color: var(--text); }
  td.film { color: var(--text2); font-style: italic; }
  td.country { color: var(--text2); font-size: 13px; }
  td.notes { color: var(--text2); font-size: 12px; }
  .oscar-star { color: var(--gold); margin-right: 4px; }

  .winner-cell { display: flex; align-items: center; gap: 10px; }
  .winner-cell > div { line-height: 1.4; }
  .author-photo {
    width: 46px; height: 46px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .author-photo.loaded { opacity: 1; }

  .no-results { text-align: center; color: var(--text2); padding: 60px 20px; font-size: 16px; }

  .cat-film .oscar-star { color: #e8c84a; }
  .cat-actor .oscar-star { color: #7ec8e3; }
  .cat-actress .oscar-star { color: #e3a0c0; }
  .cat-director .oscar-star { color: #98e87e; }
  .cat-intl .oscar-star { color: #e8a87e; }

  /* ── MOBILNI PRIKAZ ─────────────────────────────────── */
  .card-list { display: none; flex-direction: column; gap: 10px; }
  .osk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .osk-card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .osk-card-year {
    font-size: 18px;
    font-weight: bold;
    color: var(--gold2);
    white-space: nowrap;
  }
  .osk-card-winner {
    font-size: 15px;
    color: var(--text);
    font-weight: bold;
    flex: 1;
  }
  .osk-card-film {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 4px;
  }
  .osk-card-meta {
    font-size: 12px;
    color: var(--text2);
  }

  @media (max-width: 700px) {
    .controls { padding: 10px 14px; }
    .main { padding: 14px; }
    .header-title h1 { font-size: 18px; }
    table { display: none; }
    .card-list { display: flex; }
  }
</style>

var COL_LABELS = {
  film: ["Godina", "Najbolji film", "Dr\u017eava / Produkcija", "Redatelj"],
  actor: ["Godina", "Glumac", "Film", "Dr\u017eava", "Napomena"],
  actress: ["Godina", "Glumica", "Film", "Dr\u017eava", "Napomena"],
  director: ["Godina", "Redatelj", "Film", "Dr\u017eava", "Napomena"],
  intl: ["Godina", "Film (originalni naziv)", "Dr\u017eava", "Redatelj"]
};

var state = { cat: "film", decade: "all", search: "", sortCol: 0, sortDir: -1 };

function getRows() {
  var rows = DATA[state.cat].slice();
  if (state.decade !== "all") {
    var d = parseInt(state.decade);
    rows = rows.filter(function(r) { return r.year >= d && r.year < d + 10; });
  }
  if (state.search) {
    var q = state.search.toLowerCase();
    rows = rows.filter(function(r) {
      return String(r.year).includes(q) ||
        r.winner.toLowerCase().includes(q) ||
        r.film.toLowerCase().includes(q) ||
        r.country.toLowerCase().includes(q) ||
        r.notes.toLowerCase().includes(q);
    });
  }
  rows.sort(function(a, b) {
    var av, bv;
    if (state.sortCol === 0) { av = a.year; bv = b.year; }
    else { av = a.winner.toLowerCase(); bv = b.winner.toLowerCase(); }
    if (av < bv) return state.sortDir;
    if (av > bv) return -state.sortDir;
    return 0;
  });
  return rows;
}

function winnerCell(r, starClass, label) {
  return "<div class=\"winner-cell\"><img class=\"author-photo\" data-wiki=\"" + r.wiki + "\" alt=\"" + r.winner + "\"><div><span class=\"oscar-star " + starClass + "\">\u2606</span>" + label + "</div></div>";
}

function renderTable() {
  var rows = getRows();
  var cat = state.cat;
  var labels = COL_LABELS[cat];
  var html = "";

  if (rows.length === 0) {
    document.getElementById("resultsCount").textContent = "Nema rezultata.";
    document.getElementById("tableContainer").innerHTML = "<div class=\"no-results\">\u2606 Nema dobitnika za zadati filter.</div>";
    return;
  }
  document.getElementById("resultsCount").textContent = rows.length + " dobitnika";

  html += "<table class=\"cat-" + cat + "\"><thead><tr>";
  for (var i = 0; i < labels.length; i++) {
    var arrow = "";
    var sorted = "";
    if (i === 0 || i === 1) {
      arrow = (state.sortCol === i) ? (state.sortDir === -1 ? " \u25BC" : " \u25B2") : " \u25BD";
      sorted = (state.sortCol === i) ? " sorted" : "";
    }
    html += "<th class=\"" + sorted + "\" data-col=\"" + i + "\">" + labels[i] + "<span class=\"sort-arrow\">" + arrow + "</span></th>";
  }
  html += "</tr></thead><tbody>";

  for (var ri = 0; ri < rows.length; ri++) {
    var r = rows[ri];
    html += "<tr>";
    html += "<td class=\"year\">" + r.year + "</td>";
    if (cat === "film") {
      html += "<td class=\"winner\">" + winnerCell(r, "", r.winner) + "</td>";
      html += "<td class=\"country\">" + r.country + "</td>";
      html += "<td class=\"notes\">" + r.notes + "</td>";
    } else if (cat === "actor" || cat === "actress") {
      html += "<td class=\"winner\">" + winnerCell(r, "", r.winner) + "</td>";
      html += "<td class=\"film\">" + r.film + "</td>";
      html += "<td class=\"country\">" + r.country + "</td>";
      html += "<td class=\"notes\">" + r.notes + "</td>";
    } else if (cat === "director") {
      html += "<td class=\"winner\">" + winnerCell(r, "", r.winner) + "</td>";
      html += "<td class=\"film\">" + r.film + "</td>";
      html += "<td class=\"country\">" + r.country + "</td>";
      html += "<td class=\"notes\">" + r.notes + "</td>";
    } else if (cat === "intl") {
      var label = r.winner + (r.film ? " <em style=\"color:var(--text2);font-size:12px;\">(" + r.film + ")</em>" : "");
      html += "<td class=\"winner\">" + winnerCell(r, "", label) + "</td>";
      html += "<td class=\"country\">" + r.country + "</td>";
      html += "<td class=\"notes\">" + r.notes + "</td>";
    }
    html += "</tr>";
  }
  html += "</tbody></table>";
  document.getElementById("tableContainer").innerHTML = html;

  // Mobilni prikaz — kartice
  var cards = "";
  for (var ci = 0; ci < rows.length; ci++) {
    var r = rows[ci];
    var sub = "";
    if (cat === "actor" || cat === "actress" || cat === "director") sub = r.film ? "<div class=\"osk-card-film\">" + r.film + "</div>" : "";
    else if (cat === "intl") sub = r.film ? "<div class=\"osk-card-film\">" + r.film + "</div>" : "";
    cards += "<div class=\"osk-card\">";
    cards += "<div class=\"osk-card-top\"><span class=\"osk-card-year\">" + r.year + "</span><span class=\"osk-card-winner\">" + r.winner + "</span></div>";
    if (sub) cards += sub;
    cards += "<div class=\"osk-card-meta\">" + r.country + (r.notes ? " &mdash; " + r.notes : "") + "</div>";
    cards += "</div>";
  }
  document.getElementById("cardList").innerHTML = cards;
  loadPhotos();

  var ths = document.querySelectorAll("thead th[data-col]");
  for (var ti = 0; ti < ths.length; ti++) {
    ths[ti].addEventListener("click", function() {
      var col = parseInt(this.getAttribute("data-col"));
      if (col !== 0 && col !== 1) return;
      if (state.sortCol === col) { state.sortDir *= -1; }
      else { state.sortCol = col; state.sortDir = -1; }
      renderTable();
    });
  }
}

function loadPhotos() {
  var imgs = document.querySelectorAll('img.author-photo');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) return;
      var img = entry.target;
      if (img.getAttribute('data-loaded')) return;
      img.setAttribute('data-loaded', '1');
      observer.unobserve(img);
      var wiki = img.getAttribute('data-wiki');
      fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + wiki)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.thumbnail && data.thumbnail.source) {
            img.src = data.thumbnail.source;
            img.onload = function() { img.classList.add('loaded'); };
          }
        })
        .catch(function() {});
    });
  }, { rootMargin: '150px' });
  for (var i = 0; i < imgs.length; i++) observer.observe(imgs[i]);
}

document.getElementById("searchBox").addEventListener("input", function() {
  state.search = this.value.trim();
  renderTable();
});

var decBtns = document.querySelectorAll("#decadeFilter .filter-btn");
for (var i = 0; i < decBtns.length; i++) {
  decBtns[i].addEventListener("click", function() {
    state.decade = this.getAttribute("data-decade");
    for (var j = 0; j < decBtns.length; j++) decBtns[j].classList.remove("active");
    this.classList.add("active");
    renderTable();
  });
}

var catTabs = document.querySelectorAll("#catTabs .cat-tab");
for (var i = 0; i < catTabs.length; i++) {
  catTabs[i].addEventListener("click", function() {
    state.cat = this.getAttribute("data-cat");
    for (var j = 0; j < catTabs.length; j++) catTabs[j].classList.remove("active");
    this.classList.add("active");
    renderTable();
  });
}

renderTable();
