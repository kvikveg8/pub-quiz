<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pub Quiz">
<link rel="apple-touch-icon" href="../../icon.svg">
<title>NIN nagrada — Pub Quiz</title>
<style>
:root {
  --bg: #1a0f05; --surface: #241508; --surface2: #2e1a08;
  --gold: #c9a227; --gold2: #e8c84a;
  --text: #f0e6d0; --text2: #b89a70;
  --border: #4a3010; --hover: #3a2010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; }
header { background: var(--surface); border-bottom: 2px solid var(--gold); padding: 16px 24px; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 100; }
.header-back { color: var(--gold); text-decoration: none; font-size: 14px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; transition: background 0.2s; white-space: nowrap; }
.header-back:hover { background: var(--hover); }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 24px; color: var(--gold2); letter-spacing: 2px; }
.header-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.search-box { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; color: var(--text); font-family: Georgia, serif; font-size: 14px; outline: none; }
.search-box:focus { border-color: var(--gold); }
.search-box::placeholder { color: var(--text2); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-label { color: var(--text2); font-size: 12px; align-self: center; text-transform: uppercase; letter-spacing: 1px; }
.filter-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); padding: 6px 12px; font-family: Georgia, serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: bold; }

.main { padding: 24px; max-width: 1100px; margin: 0 auto; }
.results-count { color: var(--text2); font-size: 13px; margin-bottom: 16px; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead tr { background: var(--surface); border-bottom: 2px solid var(--gold); }
th { padding: 12px 14px; text-align: left; color: var(--gold); font-weight: normal; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: var(--gold2); }
th.nosort { cursor: default; }
th .sort-arrow { margin-left: 4px; opacity: 0.5; }
th.sorted .sort-arrow { opacity: 1; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:hover { background: var(--hover); }
tbody tr.highlight td { background: #1e1800; }
td { padding: 11px 14px; vertical-align: top; }
td.year { color: var(--gold2); font-size: 15px; font-weight: bold; white-space: nowrap; }
td.winner { color: var(--text); font-weight: bold; }
td.roman { color: var(--text); font-style: italic; }
td.poreklo { color: var(--text2); font-size: 13px; white-space: nowrap; }
td.notes { color: var(--text2); font-size: 12px; max-width: 260px; line-height: 1.4; }

.no-results { text-align: center; color: var(--text2); padding: 60px 20px; font-size: 16px; }

/* Mobile cards */
.card-list { display: none; flex-direction: column; gap: 10px; }
.nin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.nin-card.highlight { background: #1e1800; border-color: var(--gold); }
.nin-card-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
.nin-card-year { font-size: 17px; font-weight: bold; color: var(--gold2); white-space: nowrap; }
.nin-card-winner { font-size: 15px; color: var(--text); font-weight: bold; }
.nin-card-roman { font-size: 13px; color: var(--text); font-style: italic; margin-bottom: 4px; }
.nin-card-meta { font-size: 12px; color: var(--text2); }

@media (max-width: 700px) {
  .controls { padding: 10px 14px; }
  .main { padding: 14px; }
  .header-title h1 { font-size: 18px; }
  table { display: none; }
  .card-list { display: flex; }
}
</style>
</head>
<body>

<header>
  <a href="../../" class="header-back">← Pub Quiz</a>

  <div class="filter-group" id="decadeFilter">

</div>

<div class="main">

  <div id="tableContainer"></div>
  <div class="card-list" id="cardList"></div>
</div>

var state = { decade: 'all', q: '' };

function decade(y) {
  return Math.floor(y / 10) * 10;
}

function filtered() {
  return DATA.filter(function(d) {
    var matchDecade = state.decade === 'all' || decade(d.year) === parseInt(state.decade);
    var q = state.q;
    var matchQ = !q ||
      d.winner.toLowerCase().indexOf(q) >= 0 ||
      d.roman.toLowerCase().indexOf(q) >= 0 ||
      d.poreklo.toLowerCase().indexOf(q) >= 0 ||
      d.notes.toLowerCase().indexOf(q) >= 0;
    return matchDecade && matchQ;
  });
}

var sortCol = 'year', sortDir = 1;

function sortData(arr) {
  return arr.slice().sort(function(a, b) {
    var av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function render() {
  var data = sortData(filtered());
  var cnt = document.getElementById('resultsCount');
  cnt.textContent = data.length + ' ' + (data.length === 1 ? 'unos' : data.length < 5 ? 'unosa' : 'unosa');

  // Table
  var html = '<table><thead><tr>';
  var cols = [
    {key:'year', label:'Godina'},
    {key:'winner', label:'Autor/ka'},
    {key:'roman', label:'Roman'},
    {key:'poreklo', label:'Poreklo'},
    {key:'notes', label:'Zanimljivost', nosort:true}
  ];
  cols.forEach(function(c) {
    var cls = c.nosort ? 'nosort' : (sortCol === c.key ? 'sorted' : '');
    var arrow = c.nosort ? '' : '<span class="sort-arrow">' + (sortCol === c.key ? (sortDir === 1 ? '▲' : '▼') : '⇅') + '</span>';
    html += '<th class="' + cls + '" data-col="' + (c.key||'') + '">' + c.label + arrow + '</th>';
  });
  html += '</tr></thead><tbody>';

  data.forEach(function(d) {
    var cls = d.highlight ? ' class="highlight"' : '';
    html += '<tr' + cls + '>' +
      '<td class="year">' + d.year + '</td>' +
      '<td class="winner">' + d.winner + '</td>' +
      '<td class="roman">„' + d.roman + '"</td>' +
      '<td class="poreklo">' + d.poreklo + '</td>' +
      '<td class="notes">' + d.notes + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  if (!data.length) html = '<div class="no-results">Nema rezultata.</div>';
  document.getElementById('tableContainer').innerHTML = html;

  // Mobile cards
  var cards = '';
  data.forEach(function(d) {
    var cls = 'nin-card' + (d.highlight ? ' highlight' : '');
    cards += '<div class="' + cls + '">' +
      '<div class="nin-card-top"><span class="nin-card-year">' + d.year + '</span><span class="nin-card-winner">' + d.winner + '</span></div>' +
      '<div class="nin-card-roman">„' + d.roman + '"</div>' +
      '<div class="nin-card-meta">' + d.poreklo + (d.notes ? ' · ' + d.notes : '') + '</div>' +
      '</div>';
  });
  document.getElementById('cardList').innerHTML = cards || '<div class="no-results">Nema rezultata.</div>';

  // Sort headers
  document.querySelectorAll('th[data-col]').forEach(function(th) {
    th.onclick = function() {
      var col = this.dataset.col;
      if (!col) return;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      render();
    };
  });
}

// Decade filter
document.getElementById('decadeFilter').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  this.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  state.decade = btn.dataset.decade;
  render();
});

// Search
document.getElementById('searchBox').addEventListener('input', function() {
  state.q = this.value.trim().toLowerCase();
  render();
});

render();
</script>
</body>
</html>
