<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0a07;
    --surface: #1a1308;
    --surface2: #251c0d;
    --gold: #c9a227;
    --gold2: #e8c84a;
    --gold-dim: #7a6015;
    --red: #8b1a1a;
    --red2: #c0392b;
    --text: #f0e6d0;
    --muted: #9a8a6a;
    --border: #3a2e1a;
    --node-bg: #1e1508;
    --node-border: #c9a227;
    --line: #5a4a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    background: linear-gradient(180deg, #1a0f05 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::before {
    content: '☩';
    font-size: 32px;
    color: var(--gold);
    display: block;
    margin-bottom: 10px;
    opacity: 0.7;
  }
  .header h1 {
    font-size: clamp(24px, 5vw, 42px);
    color: var(--gold2);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: normal;
    text-shadow: 0 0 40px rgba(201,162,39,0.4);
  }
  .header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .header .dynasty-line {
    margin-top: 16px;
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 1px;
  }

  /* TIMELINE BAR */
  .timeline-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .timeline-bar::-webkit-scrollbar { display: none; }
  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 4px;
    transition: background 0.2s;
    min-width: fit-content;
    position: relative;
  }
  .tl-item:hover { background: var(--surface2); }
  .tl-item.active { background: var(--surface2); }
  .tl-item .tl-name {
    font-size: 11px;
    color: var(--gold);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .tl-item .tl-year {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .tl-sep {
    width: 20px;
    height: 1px;
    background: var(--gold-dim);
    flex-shrink: 0;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    min-height: calc(100vh - 180px);
  }

  /* TREE PANEL */
  .tree-panel {
    flex: 1;
    padding: 30px 20px;
    overflow-x: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /* DETAIL PANEL */
  .detail-panel {
    width: 380px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 0;
    overflow-y: auto;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .detail-panel.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .detail-panel.empty .hint {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 40px 20px;
    line-height: 1.6;
  }
  .detail-panel.empty .hint-icon {
    font-size: 48px;
    opacity: 0.3;
    display: block;
    text-align: center;
    padding-top: 40px;
  }

  /* DETAIL CONTENT */
  .detail-header {
    background: linear-gradient(135deg, var(--red) 0%, #3a0f0f 100%);
    padding: 28px 24px 22px;
    border-bottom: 2px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .detail-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .detail-header .ruler-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .detail-header h2 {
    font-size: 22px;
    color: var(--gold2);
    font-weight: normal;
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  .detail-header .detail-subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(240,230,208,0.7);
    font-style: italic;
    position: relative;
    z-index: 1;
  }
  .detail-header .reign-badge {
    display: inline-block;
    margin-top: 10px;
    background: rgba(201,162,39,0.15);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  .detail-body {
    padding: 20px 24px;
  }

  .detail-section {
    margin-bottom: 22px;
  }
  .detail-section h3 {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .info-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .info-item.full { grid-column: 1 / -1; }
  .info-item label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }
  .info-item span {
    font-size: 13px;
    color: var(--text);
  }

  .achievements-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .achievements-list li {
    padding: 10px 12px;
    background: var(--surface2);
    border-left: 3px solid var(--gold-dim);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .achievements-list li::before {
    content: '✦ ';
    color: var(--gold);
    font-size: 10px;
  }

  .zaduzbine-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .zaduzbina-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .zaduzbina-item .z-name {
    font-size: 14px;
    color: var(--gold2);
    font-style: italic;
  }
  .zaduzbina-item .z-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  /* FAMILY TREE SVG */
  .tree-svg-container {
    min-width: 700px;
    width: 100%;
  }

  svg.family-tree {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  .node-group {
    cursor: pointer;
  }
  .node-rect {
    fill: var(--node-bg);
    stroke: var(--node-border);
    stroke-width: 1.5;
    rx: 8;
    transition: all 0.2s;
  }
  .node-group:hover .node-rect,
  .node-group.active .node-rect {
    fill: #2a1e08;
    stroke: var(--gold2);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 8px rgba(201,162,39,0.4));
  }
  .node-group.active .node-rect {
    fill: #2e1f05;
  }
  .node-name {
    fill: var(--gold2);
    font-family: 'Georgia', serif;
    font-size: 12px;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .node-years {
    fill: var(--muted);
    font-family: 'Georgia', serif;
    font-size: 10px;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .node-title {
    fill: var(--gold-dim);
    font-family: 'Georgia', serif;
    font-size: 9px;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    font-style: italic;
  }
  .tree-line {
    stroke: var(--line);
    stroke-width: 1.5;
    fill: none;
  }
  .tree-line-gold {
    stroke: var(--gold-dim);
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 4 3;
  }

  .crown-icon {
    fill: var(--gold);
    font-size: 14px;
    text-anchor: middle;
    pointer-events: none;
  }

  /* CLOSE BUTTON */
  .close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    z-index: 10;
    transition: all 0.2s;
  }
  .close-btn:hover {
    color: var(--text);
    border-color: var(--gold);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .detail-panel {
      width: 100%;
      border-left: none;
      border-top: 1px solid var(--border);
      max-height: 60vh;
    }
    .tree-panel { padding: 20px 10px; }
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-line {
    width: 24px;
    height: 2px;
    background: var(--line);
  }
  .legend-line.dashed {
    background: repeating-linear-gradient(90deg, var(--gold-dim) 0, var(--gold-dim) 4px, transparent 4px, transparent 7px);
    height: 1px;
  }
</style>
</head>

const nodeLayout = {
  nemanja:   { x: 310, y: 20,  w: 170, h: 62 },
  vukan:     { x: 30,  y: 145, w: 130, h: 56 },
  stefan1:   { x: 310, y: 145, w: 170, h: 56 },
  rastko:    { x: 630, y: 145, w: 140, h: 56 },
  radoslav:  { x: 100, y: 290, w: 130, h: 56 },
  vladislav: { x: 310, y: 290, w: 130, h: 56 },
  uros1:     { x: 510, y: 290, w: 130, h: 56 },
  dragutin:  { x: 390, y: 430, w: 130, h: 56 },
  milutin:   { x: 580, y: 430, w: 140, h: 56 },
  decanski:  { x: 570, y: 560, w: 160, h: 56 },
  dusan:     { x: 560, y: 645, w: 160, h: 58 },
  uros5:     { x: 400, y: 645, w: 140, h: 58 }
};

const connections = [
  { from: 'nemanja',  to: 'vukan',     style: 'side' },
  { from: 'nemanja',  to: 'stefan1',   style: 'direct' },
  { from: 'nemanja',  to: 'rastko',    style: 'side' },
  { from: 'stefan1',  to: 'radoslav',  style: 'side' },
  { from: 'stefan1',  to: 'vladislav', style: 'side' },
  { from: 'stefan1',  to: 'uros1',     style: 'side' },
  { from: 'uros1',    to: 'dragutin',  style: 'side' },
  { from: 'uros1',    to: 'milutin',   style: 'direct' },
  { from: 'milutin',  to: 'decanski',  style: 'direct' },
  { from: 'decanski', to: 'dusan',     style: 'direct' },
  { from: 'dusan',    to: 'uros5',     style: 'side' }
];

function cx(id) { return nodeLayout[id].x + nodeLayout[id].w / 2; }
function bottom(id) { return nodeLayout[id].y + nodeLayout[id].h; }
function nodeTop(id) { return nodeLayout[id].y; }

function buildTree() {
  var svg = document.getElementById('familyTree');
  connections.forEach(function(c) {
    var fx = cx(c.from), fy = bottom(c.from);
    var tx = cx(c.to),   ty = nodeTop(c.to);
    var my = (fy + ty) / 2;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M '+fx+' '+fy+' C '+fx+' '+my+', '+tx+' '+my+', '+tx+' '+ty);
    path.setAttribute('class', c.style === 'direct' ? 'tree-line' : 'tree-line-gold');
    svg.appendChild(path);
  });
  Object.keys(nodeLayout).forEach(function(id) {
    var r = rulers[id], l = nodeLayout[id];
    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-group');
    g.setAttribute('id', 'node-' + id);
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('class', 'node-rect');
    rect.setAttribute('x', l.x); rect.setAttribute('y', l.y);
    rect.setAttribute('width', l.w); rect.setAttribute('height', l.h);
    rect.setAttribute('rx', 8);
    g.appendChild(rect);
    var nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('class', 'node-name');
    nameEl.setAttribute('x', cx(id)); nameEl.setAttribute('y', l.y + 18);
    nameEl.textContent = r.shortName;
    g.appendChild(nameEl);
    var titleEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    titleEl.setAttribute('class', 'node-title');
    titleEl.setAttribute('x', cx(id)); titleEl.setAttribute('y', l.y + 32);
    titleEl.textContent = r.title.length > 22 ? r.title.slice(0,22)+'\u2026' : r.title;
    g.appendChild(titleEl);
    var yearsEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    yearsEl.setAttribute('class', 'node-years');
    yearsEl.setAttribute('x', cx(id)); yearsEl.setAttribute('y', l.y + 47);
    yearsEl.textContent = r.reign;
    g.appendChild(yearsEl);
    g.addEventListener('click', (function(i){ return function(){ showRuler(i); }; })(id));
    svg.appendChild(g);
  });
}

function buildTimeline() {
  var bar = document.getElementById('timelineBar');
  var order = ['nemanja','stefan1','radoslav','vladislav','uros1','dragutin','milutin','decanski','dusan','uros5'];
  order.forEach(function(id, i) {
    var r = rulers[id];
    var item = document.createElement('div');
    item.className = 'tl-item';
    item.id = 'tl-' + id;
    item.innerHTML = '<span class="tl-name">'+r.shortName+'</span><span class="tl-year">'+r.reignStart+'</span>';
    item.addEventListener('click', (function(i){ return function(){ showRuler(i); }; })(id));
    bar.appendChild(item);
    if (i < order.length - 1) {
      var sep = document.createElement('div');
      sep.className = 'tl-sep';
      bar.appendChild(sep);
    }
  });
}

function showRuler(id) {
  var r = rulers[id];
  var panel = document.getElementById('detailPanel');
  document.querySelectorAll('.node-group').forEach(function(n){ n.classList.remove('active'); });
  document.querySelectorAll('.tl-item').forEach(function(n){ n.classList.remove('active'); });
  var node = document.getElementById('node-' + id);
  if (node) node.classList.add('active');
  var tl = document.getElementById('tl-' + id);
  if (tl) { tl.classList.add('active'); tl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
  panel.classList.remove('empty');
  var achievementsHTML = r.achievements.map(function(a){ return '<li>'+a+'</li>'; }).join('');
  var zaduzbineHTML = r.zaduzbine.map(function(z){
    return '<div class="zaduzbina-item"><div class="z-name">&#9962; '+z.name+'</div><div class="z-desc">'+z.desc+'</div></div>';
  }).join('');
  var childNames = (r.children || []).map(function(cid){ return rulers[cid] ? rulers[cid].shortName : ''; }).filter(Boolean).join(', ') || '\u2014';
  var parentName = r.parent ? (rulers[r.parent] ? rulers[r.parent].shortName : '\u2014') : 'Osniva\u010d';
  panel.innerHTML =
    '<div class="detail-header">' +
      '<button class="close-btn" onclick="closeDetail()">\u2715</button>' +
      '<div class="ruler-title">Vladar Srbije</div>' +
      '<h2>'+r.name+'</h2>' +
      '<div class="detail-subtitle">'+r.title+'</div>' +
      '<span class="reign-badge">&#x2629; '+r.reign+'</span>' +
    '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-section"><h3>Li\u010dni podaci</h3>' +
        '<div class="info-grid">' +
          '<div class="info-item"><label>Ro\u0111en</label><span>'+r.born+'</span></div>' +
          '<div class="info-item"><label>Umro</label><span>'+r.died+'</span></div>' +
          '<div class="info-item"><label>Vladavina</label><span>'+r.reign+'</span></div>' +
          '<div class="info-item"><label>Supruznik</label><span>'+r.spouse+'</span></div>' +
          '<div class="info-item"><label>Otac / Prethodnik</label><span>'+parentName+'</span></div>' +
          '<div class="info-item"><label>Naslednici</label><span>'+childNames+'</span></div>' +
          '<div class="info-item full"><label>Biografija</label><span>'+r.bio+'</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="detail-section"><h3>Najva\u017enija dostignu\u0107a</h3>' +
        '<ul class="achievements-list">'+achievementsHTML+'</ul>' +
      '</div>' +
      '<div class="detail-section"><h3>Zadu\u017ebine</h3>' +
        '<div class="zaduzbine-list">'+zaduzbineHTML+'</div>' +
      '</div>' +
    '</div>';
}

function closeDetail() {
  var panel = document.getElementById('detailPanel');
  panel.classList.add('empty');
  panel.innerHTML = '<span class="hint-icon">&#x2629;</span><div class="hint">Klikni na vladara u porodi\u010dnom stablu da vidi\u0161 njegove najva\u017enije informacije</div>';
  document.querySelectorAll('.node-group').forEach(function(n){ n.classList.remove('active'); });
  document.querySelectorAll('.tl-item').forEach(function(n){ n.classList.remove('active'); });
}

buildTree();
buildTimeline();
</script>
