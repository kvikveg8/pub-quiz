<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezolitik — Praistorija — Pub Quiz</title>
<link rel="manifest" href="../../../manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pub Quiz">
<link rel="apple-touch-icon" href="../../../icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #04100e;
  --surface: #081c18;
  --surface2: #0c2420;
  --gold: #c9a227;
  --gold2: #e8c84a;
  --gold-dim: #7a6015;
  --text: #f0e6d0;
  --muted: #9a8060;
  --border: #0e2a24;
  --border2: #143830;
  --era-color: #3ab8a0;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(10,80,70,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(20,60,55,0.2) 0%, transparent 60%);
}
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border2);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-back {
  color: #3a7a70;
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.header-back:hover { color: var(--era-color); border-color: #3a7a70; }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 20px; color: var(--era-color); font-weight: normal; letter-spacing: 3px; }
.header-title p { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
.header-spacer { width: 80px; }
.stats-bar { max-width: 860px; margin: 0 auto; padding: 14px 20px 0; }
.stats-count { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
.stats-count span { color: var(--era-color); }
.main-wrap { max-width: 860px; margin: 0 auto; padding: 20px 20px 60px; }
.timeline { position: relative; padding-left: 28px; margin-top: 16px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border2); }
.event { position: relative; margin-bottom: 12px; cursor: pointer; }
.event::before { content: ''; position: absolute; left: -24px; top: 18px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--era-color); background: var(--bg); transition: all 0.2s; z-index: 1; }
.event.open::before { background: var(--era-color); transform: scale(1.3); }
.event-card { background: var(--surface); border: 1px solid var(--border2); border-left: 3px solid var(--era-color); border-radius: 8px; overflow: hidden; transition: box-shadow 0.2s; }
.event:hover .event-card, .event.open .event-card { box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.event-head { padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; }
.event-date { font-size: 10px; color: #3a7a70; white-space: nowrap; min-width: 100px; padding-top: 3px; letter-spacing: 0.3px; font-style: italic; line-height: 1.4; }
.event-main { flex: 1; }
.event-title { font-size: 15px; color: var(--text); line-height: 1.35; }
.event-arrow { color: var(--muted); font-size: 13px; padding-top: 2px; transition: transform 0.2s, color 0.2s; flex-shrink: 0; }
.event.open .event-arrow { transform: rotate(90deg); color: var(--era-color); }
.event-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.event.open .event-body { display: block; }
.event-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 12px; margin-bottom: 12px; }
.event-meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin-bottom: 10px; }
.event-meta-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
.event-meta-label { font-size: 10px; color: #3a7a70; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.event-meta-val { font-size: 12px; color: var(--text); line-height: 1.5; }
.event-fact { margin-top: 4px; padding: 10px 14px; background: rgba(58,184,160,0.06); border: 1px solid rgba(58,184,160,0.2); border-radius: 6px; font-size: 12px; color: #3a9a8a; font-style: italic; line-height: 1.55; }
.event-fact::before { content: '\2605\00A0\00A0'; color: var(--era-color); }
footer { text-align: center; padding: 24px; border-top: 1px solid var(--border2); font-size: 12px; color: #3a7a70; letter-spacing: 2px; }
@media (max-width: 600px) {
  .header-title h1 { font-size: 15px; letter-spacing: 1px; }
  .header-spacer { width: 50px; }
  .event-date { min-width: 76px; font-size: 9px; }
  .event-title { font-size: 14px; }
  .event-meta-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <a href="../../index.html" class="header-back">&#8592; Istorija</a>
  <div class="header-title">
    <h1>&#127754; MEZOLITIK</h1>
    <p>~10.000 &#8211; 8.000 P.N.E. &nbsp;&#8226;&nbsp; SREDNJE KAMENO DOBA</p>
  </div>
  <div class="header-spacer"></div>
</header>

<div class="stats-bar">
  <div class="stats-count"><span id="eventCount">3</span> klju&#269;na doga&#273;aja</div>
</div>

<div class="main-wrap">
  <div class="timeline" id="timeline"></div>
</div>

<footer>&#9830; Mezolitik &#9830; Prelazno doba &#9830; Kraj ledenog doba &#9830;</footer>

<script>
var EVENTS = [
  {
    displayYear: '~11.700 p.n.e.',
    title: 'Kraj ledenog doba',
    desc: 'Mladi drijas \u2014 poslednja faza ledenog doba \u2014 zavr\u0161ila se naglim zagrejavanjem pre oko 11.700 godina. Glečeri su se topili, nivo mora porastao je za oko 120 metara, potapaju\u0107i kopnene mostove. Britanija se odvojila od Evrope. Australija od Azije. Mamuti i dlakavi nosorozi po\u010deli su nestajati. \u010cove\u010danstvo je moralo da se prilagodi potpuno novom svetu.',
    place: 'Globalno',
    figures: 'Homo sapiens',
    fact: 'Nivo mora u ledenom dobu bio je toliko ni\u017ei da je na mestu dana\u0161njeg Severnog mora bila ravnica \u2014 Dogerlend \u2014 gde su \u017eiveli lovci. Potopio ga je okean pre oko 8.000 godina.'
  },
  {
    displayYear: '~9.000 p.n.e.',
    title: 'Domestifikacija psa',
    desc: 'Vuk je domestifikovan i pretvoren u psa negde u Evroaziji, mada se ta\u010dno mesto i vreme jo\u0161 debatuju. Psi su slu\u017eili kao pomo\u0107 u lovu, \u010duvari naselja i drustvo. Ovo je bila prva domestifikacija bilo koje \u017eivotinje \u2014 hiljadama godina pre doma\u0107ih \u017eivotinja kao \u0161to su ovce i krave.',
    place: 'Evroazija (ta\u010dna lokacija nepoznata)',
    figures: 'Homo sapiens, Canis lupus (vuk)',
    fact: 'Pas je jedina doma\u0107a \u017eivotinja koju su domestifikovali lovci-sakuplja\u010di \u2014 sve ostale su domestifikovane tek u periodu poljoprivrede. Pas je bio \u010dovestev najstariji saveznik.'
  },
  {
    displayYear: '~7.000 p.n.e.',
    title: 'Lepenski Vir &#8212; Srbija &#127464;&#127479;',
    desc: 'Na stenovitoj obali Dunava u Srbiji (klisura \u0110erdap, blizu Majdanpeka) razvilo se jedno od najstarijih stalnih naselja u Evropi. Stanovnici Lepenskog Vira gradili su trapezaste ku\u0107e od kamena i dr\u017eeta, sa ognji\u0161tima i kamenim skulpturama \u2014 \u010duve\u0107im ribljim bo\u017eanstvima.',
    place: 'Klisura \u0110erdap, Srbija (danas pod Dunav-skim jezerom)',
    figures: 'Lovci-sakuplja\u010di mezolitika',
    fact: 'Lepenski Vir je stariji od Stounhend\u017ea za skoro 6.000 godina! Kada su izgra\u0111ene egipatske piramide, ovo naselje ve\u0107 je odavno napusteno. Danas je velikim delom potopljeno Dunavskim jezerom, ali je za\u0161ti\u0107eno pod Unesko.'
  }
];

function buildEvent(e, uid) {
  return '<div class="event" id="' + uid + '" onclick="toggleEvent(\'' + uid + '\')">' +
    '<div class="event-card">' +
      '<div class="event-head">' +
        '<div class="event-date">' + e.displayYear + '</div>' +
        '<div class="event-main"><div class="event-title">' + e.title + '</div></div>' +
        '<div class="event-arrow">&#9658;</div>' +
      '</div>' +
      '<div class="event-body">' +
        '<div class="event-desc">' + e.desc + '</div>' +
        '<div class="event-meta-grid">' +
          (e.place   ? '<div class="event-meta-item"><div class="event-meta-label">Lokacija</div><div class="event-meta-val">' + e.place + '</div></div>' : '') +
          (e.figures ? '<div class="event-meta-item"><div class="event-meta-label">Vrsta / Li\u010dnosti</div><div class="event-meta-val">' + e.figures + '</div></div>' : '') +
        '</div>' +
        (e.fact ? '<div class="event-fact">' + e.fact + '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
}
function toggleEvent(uid) {
  var el = document.getElementById(uid);
  if (!el) return;
  var isOpen = el.classList.contains('open');
  document.querySelectorAll('.event.open').forEach(function(e) { e.classList.remove('open'); });
  if (!isOpen) el.classList.add('open');
}
var tl = document.getElementById('timeline');
var html = '';
EVENTS.forEach(function(e, idx) { html += buildEvent(e, 'ev-' + idx); });
tl.innerHTML = html;
document.getElementById('eventCount').textContent = EVENTS.length;
</script>
</body>
</html>
