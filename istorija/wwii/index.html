<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>II Svetski rat — Pub Quiz</title>
<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pub Quiz">
<link rel="apple-touch-icon" href="../../icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #100a04;
  --surface: #1c1008;
  --surface2: #261508;
  --surface3: #301a0a;
  --gold: #c9a227;
  --gold2: #e8c84a;
  --gold-dim: #7a6015;
  --text: #f0e6d0;
  --muted: #9a8060;
  --border: #3a2a12;
  --border2: #4a3518;
  --c-vojna: #8b2020;
  --c-vojna-b: #c04040;
  --c-politicki: #1e4a7a;
  --c-politicki-b: #4a88c0;
  --c-prekretnica: #7a5c10;
  --c-prekretnica-b: #c9a227;
  --c-holokaust: #3a1a3a;
  --c-holokaust-b: #8a5a8a;
  --c-pacifik: #145a40;
  --c-pacifik-b: #3a9a70;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(139,32,32,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(92,61,30,0.2) 0%, transparent 60%);
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border2);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-back {
  color: var(--gold-dim);
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.header-back:hover { color: var(--gold); border-color: var(--gold-dim); }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 20px; color: var(--gold2); font-weight: normal; letter-spacing: 3px; }
.header-title p { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
.header-spacer { width: 80px; }

/* FILTERS */
.filters-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-label {
  font-size: 10px;
  color: var(--gold-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  align-self: center;
  min-width: fit-content;
  margin-right: 4px;
}
.fbtn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 5px 12px;
  color: var(--muted);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.fbtn:hover { border-color: var(--gold-dim); color: var(--gold); }
.fbtn.active { color: var(--gold2); border-color: var(--gold); background: var(--surface3); }
.fbtn.f-vojna.active { border-color: var(--c-vojna-b); color: #f09090; background: #1f0808; }
.fbtn.f-politicki.active { border-color: var(--c-politicki-b); color: #90b8e0; background: #080c18; }
.fbtn.f-prekretnica.active { border-color: var(--c-prekretnica-b); color: var(--gold2); background: #1a1200; }
.fbtn.f-holokaust.active { border-color: var(--c-holokaust-b); color: #c090c0; background: #100810; }
.fbtn.f-pacifik.active { border-color: var(--c-pacifik-b); color: #80d0a8; background: #041410; }

/* STATS BAR */
.stats-bar {
  max-width: 900px;
  margin: 0 auto;
  padding: 14px 20px 0;
  display: flex;
  gap: 16px;
  align-items: center;
}
.stats-count {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
}
.stats-count span { color: var(--gold); }

/* MAIN */
.main-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* YEAR GROUP */
.year-group { margin-bottom: 8px; }
.year-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  margin-top: 8px;
}
.year-badge {
  background: var(--surface2);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 6px 18px;
  font-size: 20px;
  color: var(--gold2);
  letter-spacing: 3px;
  font-weight: normal;
  white-space: nowrap;
}
.year-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-dim), transparent);
}

/* TIMELINE */
.timeline {
  position: relative;
  padding-left: 28px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 7px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--border2), var(--border2));
}

/* EVENT */
.event {
  position: relative;
  margin-bottom: 12px;
  cursor: pointer;
}
.event::before {
  content: '';
  position: absolute;
  left: -24px;
  top: 18px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: var(--bg);
  transition: all 0.2s;
  z-index: 1;
}
.event.cat-vojna::before       { border-color: var(--c-vojna-b); }
.event.cat-politicki::before   { border-color: var(--c-politicki-b); }
.event.cat-prekretnica::before { border-color: var(--c-prekretnica-b); background: var(--c-prekretnica-b); }
.event.cat-holokaust::before   { border-color: var(--c-holokaust-b); }
.event.cat-pacifik::before     { border-color: var(--c-pacifik-b); }
.event.open::before { transform: scale(1.4); }

.event-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--border2);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.event.cat-vojna .event-card       { border-left-color: var(--c-vojna-b); }
.event.cat-politicki .event-card   { border-left-color: var(--c-politicki-b); }
.event.cat-prekretnica .event-card { border-left-color: var(--c-prekretnica-b); }
.event.cat-holokaust .event-card   { border-left-color: var(--c-holokaust-b); }
.event.cat-pacifik .event-card     { border-left-color: var(--c-pacifik-b); }

.event:hover .event-card,
.event.open .event-card {
  border-color: var(--border2);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}

.event-head {
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.event-date {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  min-width: 80px;
  padding-top: 2px;
  letter-spacing: 0.5px;
}
.event-main { flex: 1; }
.event-title {
  font-size: 15px;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 4px;
}
.event.cat-prekretnica .event-title { color: var(--gold2); }

.event-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
  border: 1px solid;
}
.cat-badge.vojna       { background: #1f0808; color: #f09090; border-color: var(--c-vojna-b); }
.cat-badge.politicki   { background: #080c18; color: #90b8e0; border-color: var(--c-politicki-b); }
.cat-badge.prekretnica { background: #1a1200; color: var(--gold2); border-color: var(--c-prekretnica-b); }
.cat-badge.holokaust   { background: #100810; color: #c090c0; border-color: var(--c-holokaust-b); }
.cat-badge.pacifik     { background: #041410; color: #80d0a8; border-color: var(--c-pacifik-b); }

.event-arrow {
  color: var(--muted);
  font-size: 13px;
  padding-top: 2px;
  transition: transform 0.2s, color 0.2s;
  flex-shrink: 0;
}
.event.open .event-arrow { transform: rotate(90deg); color: var(--gold); }

/* EXPANDED */
.event-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
  margin-top: 0;
}
.event.open .event-body { display: block; }
.event-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.65;
  margin-top: 12px;
  margin-bottom: 12px;
}
.event-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.event-meta-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
}
.event-meta-label {
  font-size: 10px;
  color: var(--gold-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.event-meta-val {
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
}
.event-significance {
  margin-top: 10px;
  padding: 10px 14px;
  background: rgba(201,162,39,0.06);
  border: 1px solid rgba(201,162,39,0.15);
  border-radius: 6px;
  font-size: 12px;
  color: var(--gold-dim);
  font-style: italic;
  line-height: 1.5;
}
.event-significance::before { content: '★  '; color: var(--gold); }

/* EMPTY */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-style: italic;
  font-size: 14px;
}
.no-results span { display: block; font-size: 32px; margin-bottom: 12px; }

/* FOOTER */
footer {
  text-align: center;
  padding: 24px;
  border-top: 1px solid var(--border2);
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 2px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .header-title h1 { font-size: 15px; letter-spacing: 1px; }
  .header-spacer { width: 50px; }
  .event-head { gap: 8px; }
  .event-date { min-width: 64px; font-size: 10px; }
  .event-title { font-size: 14px; }
  .event-meta-grid { grid-template-columns: 1fr; }
  .year-badge { font-size: 16px; padding: 5px 12px; }
}
</style>
</head>

// ── STATE & FILTERS ───────────────────────────────────
var filterYear = 'sve';
var filterCat  = 'sve';

function setFilter(type, val, el) {
  if (type === 'year') {
    filterYear = val;
    document.querySelectorAll('[data-year]').forEach(function(b) { b.classList.remove('active'); });
  } else {
    filterCat = val;
    document.querySelectorAll('[data-cat]').forEach(function(b) { b.classList.remove('active'); });
  }
  el.classList.add('active');
  render();
}

function render() {
  var filtered = EVENTS.filter(function(e) {
    var okYear = filterYear === 'sve' || String(e.year) === filterYear;
    var okCat  = filterCat  === 'sve' || e.cat === filterCat;
    return okYear && okCat;
  });

  document.getElementById('countShown').textContent = filtered.length;
  document.getElementById('countTotal').textContent = EVENTS.length;

  var wrap = document.getElementById('mainWrap');

  if (!filtered.length) {
    wrap.innerHTML = '<div class="no-results"><span>&#128269;</span>Nema doga\u0111aja za izabrane filtere.</div>';
    return;
  }

  // Group by year
  var byYear = {};
  filtered.forEach(function(e) {
    if (!byYear[e.year]) byYear[e.year] = [];
    byYear[e.year].push(e);
  });

  var years = Object.keys(byYear).map(Number).sort(function(a,b){return a-b;});

  var html = '';
  years.forEach(function(yr) {
    html += '<div class="year-group">';
    html += '<div class="year-header"><div class="year-badge">' + yr + '</div><div class="year-line"></div></div>';
    html += '<div class="timeline">';
    byYear[yr].forEach(function(e, idx) {
      var uid = 'ev-' + e.year + '-' + idx;
      html += buildEvent(e, uid);
    });
    html += '</div></div>';
  });

  wrap.innerHTML = html;
}

function buildEvent(e, uid) {
  var catLabels = {
    vojna: 'Vojna operacija',
    politicki: 'Politi\u010dki',
    prekretnica: 'Prekretnica',
    holokaust: 'Holokaust',
    pacifik: 'Pacifik'
  };
  return '<div class="event cat-' + e.cat + '" id="' + uid + '" onclick="toggleEvent(\'' + uid + '\')">' +
    '<div class="event-card">' +
      '<div class="event-head">' +
        '<div class="event-date">' + e.date + '</div>' +
        '<div class="event-main">' +
          '<div class="event-title">' + e.title + '</div>' +
          '<div class="event-badges"><span class="cat-badge ' + e.cat + '">' + (catLabels[e.cat]||e.cat) + '</span></div>' +
        '</div>' +
        '<div class="event-arrow">&#9658;</div>' +
      '</div>' +
      '<div class="event-body">' +
        '<div class="event-desc">' + e.desc + '</div>' +
        '<div class="event-meta-grid">' +
          (e.place   ? '<div class="event-meta-item"><div class="event-meta-label">Lokacija</div><div class="event-meta-val">' + e.place   + '</div></div>' : '') +
          (e.figures ? '<div class="event-meta-item"><div class="event-meta-label">Klju\u010dne li\u010dnosti</div><div class="event-meta-val">' + e.figures + '</div></div>' : '') +
          (e.result  ? '<div class="event-meta-item"><div class="event-meta-label">Ishod</div><div class="event-meta-val">' + e.result  + '</div></div>' : '') +
        '</div>' +
        (e.significance ? '<div class="event-significance">' + e.significance + '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleEvent(uid) {
  var el = document.getElementById(uid);
  if (!el) return;
  var isOpen = el.classList.contains('open');
  // Close all
  document.querySelectorAll('.event.open').forEach(function(e) { e.classList.remove('open'); });
  // Open clicked if it was closed
  if (!isOpen) el.classList.add('open');
}

// Init
render();
</script>
