<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jugoslavija 1941–1945 — Pub Quiz</title>
<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pub Quiz">
<link rel="apple-touch-icon" href="../../icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0a08;
  --surface: #181008;
  --surface2: #221408;
  --surface3: #2c1a0c;
  --gold: #c9a227;
  --gold2: #e8c84a;
  --gold-dim: #7a6015;
  --text: #f0e6d0;
  --muted: #9a8060;
  --border: #3a2a12;
  --border2: #4a3518;
  --c-napad: #7a1a1a;
  --c-napad-b: #b04040;
  --c-zlocin: #2a2020;
  --c-zlocin-b: #806060;
  --c-otpor: #1a4020;
  --c-otpor-b: #40904a;
  --c-politicki: #1a2e5a;
  --c-politicki-b: #4a70b0;
  --c-oslobodenje: #5a4a10;
  --c-oslobodenje-b: #c9a227;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(122,26,26,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(64,144,74,0.06) 0%, transparent 55%);
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border2);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-back {
  color: var(--gold-dim);
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.header-back:hover { color: var(--gold); border-color: var(--gold-dim); }
.header-title { flex: 1; text-align: center; }
.header-title h1 { font-size: 20px; color: var(--gold2); font-weight: normal; letter-spacing: 3px; }
.header-title p { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 3px; }
.header-spacer { width: 80px; }

/* FILTERS */
.filters-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-label {
  font-size: 10px;
  color: var(--gold-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  align-self: center;
  min-width: fit-content;
  margin-right: 4px;
}
.fbtn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 5px 12px;
  color: var(--muted);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.fbtn:hover { border-color: var(--gold-dim); color: var(--gold); }
.fbtn.active                   { color: var(--gold2); border-color: var(--gold); background: var(--surface3); }
.fbtn.f-napad.active           { border-color: var(--c-napad-b); color: #f09090; background: #1a0808; }
.fbtn.f-zlocin.active          { border-color: var(--c-zlocin-b); color: #c0a0a0; background: #100808; }
.fbtn.f-otpor.active           { border-color: var(--c-otpor-b); color: #90d090; background: #080f08; }
.fbtn.f-politicki.active       { border-color: var(--c-politicki-b); color: #90b8e0; background: #08080f; }
.fbtn.f-oslobodenje.active     { border-color: var(--c-oslobodenje-b); color: var(--gold2); background: #141000; }

/* STATS */
.stats-bar {
  max-width: 900px;
  margin: 0 auto;
  padding: 14px 20px 0;
}
.stats-count { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
.stats-count span { color: var(--gold); }

/* MAIN */
.main-wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

/* YEAR GROUP */
.year-group { margin-bottom: 8px; }
.year-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  margin-top: 8px;
}
.year-badge {
  background: var(--surface2);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 6px 18px;
  font-size: 20px;
  color: var(--gold2);
  letter-spacing: 3px;
  font-weight: normal;
  white-space: nowrap;
}
.year-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-dim), transparent); }

/* TIMELINE */
.timeline { position: relative; padding-left: 28px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 7px; top: 0; bottom: 0;
  width: 2px;
  background: var(--border2);
}

/* EVENT */
.event { position: relative; margin-bottom: 12px; cursor: pointer; }
.event::before {
  content: '';
  position: absolute;
  left: -24px; top: 18px;
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: var(--bg);
  transition: all 0.2s;
  z-index: 1;
}
.event.cat-napad::before       { border-color: var(--c-napad-b); }
.event.cat-zlocin::before      { border-color: var(--c-zlocin-b); background: #1a0808; }
.event.cat-otpor::before       { border-color: var(--c-otpor-b); }
.event.cat-politicki::before   { border-color: var(--c-politicki-b); }
.event.cat-oslobodenje::before { border-color: var(--c-oslobodenje-b); background: var(--c-oslobodenje-b); }
.event.open::before { transform: scale(1.4); }

.event-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--border2);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.event.cat-napad .event-card       { border-left-color: var(--c-napad-b); }
.event.cat-zlocin .event-card      { border-left-color: var(--c-zlocin-b); }
.event.cat-otpor .event-card       { border-left-color: var(--c-otpor-b); }
.event.cat-politicki .event-card   { border-left-color: var(--c-politicki-b); }
.event.cat-oslobodenje .event-card { border-left-color: var(--c-oslobodenje-b); }
.event:hover .event-card,
.event.open .event-card { box-shadow: 0 4px 16px rgba(0,0,0,0.6); }

.event-head { padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; }
.event-date { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 80px; padding-top: 2px; letter-spacing: 0.5px; }
.event-main { flex: 1; }
.event-title { font-size: 15px; color: var(--text); line-height: 1.35; margin-bottom: 5px; }
.event.cat-oslobodenje .event-title { color: var(--gold2); }
.event-badges { display: flex; gap: 6px; flex-wrap: wrap; }

.cat-badge {
  font-size: 10px; padding: 2px 8px;
  border-radius: 4px; letter-spacing: 1px; border: 1px solid;
}
.cat-badge.napad       { background: #1a0808; color: #f09090; border-color: var(--c-napad-b); }
.cat-badge.zlocin      { background: #100808; color: #c0a0a0; border-color: var(--c-zlocin-b); }
.cat-badge.otpor       { background: #080f08; color: #90d090; border-color: var(--c-otpor-b); }
.cat-badge.politicki   { background: #08080f; color: #90b8e0; border-color: var(--c-politicki-b); }
.cat-badge.oslobodenje { background: #141000; color: var(--gold2); border-color: var(--c-oslobodenje-b); }

.event-arrow { color: var(--muted); font-size: 13px; padding-top: 2px; transition: transform 0.2s, color 0.2s; flex-shrink: 0; }
.event.open .event-arrow { transform: rotate(90deg); color: var(--gold); }

.event-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.event.open .event-body { display: block; }
.event-desc { font-size: 13px; color: var(--muted); line-height: 1.65; margin-top: 12px; margin-bottom: 12px; }
.event-meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.event-meta-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
.event-meta-label { font-size: 10px; color: var(--gold-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.event-meta-val { font-size: 12px; color: var(--text); line-height: 1.5; }
.event-significance {
  margin-top: 10px; padding: 10px 14px;
  background: rgba(201,162,39,0.05); border: 1px solid rgba(201,162,39,0.12);
  border-radius: 6px; font-size: 12px; color: var(--gold-dim); font-style: italic; line-height: 1.5;
}
.event-significance::before { content: '\2605\00A0\00A0'; color: var(--gold); }

/* EMPTY */
.no-results { text-align: center; padding: 60px 20px; color: var(--muted); font-style: italic; font-size: 14px; }
.no-results span { display: block; font-size: 32px; margin-bottom: 12px; }

footer { text-align: center; padding: 24px; border-top: 1px solid var(--border2); font-size: 12px; color: var(--gold-dim); letter-spacing: 2px; }

@media (max-width: 600px) {
  .header-title h1 { font-size: 14px; letter-spacing: 1px; }
  .header-spacer { width: 50px; }
  .event-date { min-width: 60px; font-size: 10px; }
  .event-title { font-size: 14px; }
  .event-meta-grid { grid-template-columns: 1fr; }
  .year-badge { font-size: 16px; padding: 5px 12px; }
}
</style>
</head>

// ── FILTERI ───────────────────────────────────────────
var filterYear = 'sve';
var filterCat  = 'sve';

function setFilter(type, val, el) {
  if (type === 'year') {
    filterYear = val;
    document.querySelectorAll('[data-year]').forEach(function(b) { b.classList.remove('active'); });
  } else {
    filterCat = val;
    document.querySelectorAll('[data-cat]').forEach(function(b) { b.classList.remove('active'); });
  }
  el.classList.add('active');
  render();
}

function render() {
  var filtered = EVENTS.filter(function(e) {
    var okYear = filterYear === 'sve' || String(e.year) === filterYear;
    var okCat  = filterCat  === 'sve' || e.cat === filterCat;
    return okYear && okCat;
  });

  document.getElementById('countShown').textContent = filtered.length;
  document.getElementById('countTotal').textContent = EVENTS.length;

  var wrap = document.getElementById('mainWrap');
  if (!filtered.length) {
    wrap.innerHTML = '<div class="no-results"><span>&#128269;</span>Nema doga\u0111aja za izabrane filtere.</div>';
    return;
  }

  var byYear = {};
  filtered.forEach(function(e) {
    if (!byYear[e.year]) byYear[e.year] = [];
    byYear[e.year].push(e);
  });

  var years = Object.keys(byYear).map(Number).sort(function(a,b){return a-b;});
  var html = '';
  years.forEach(function(yr) {
    html += '<div class="year-group"><div class="year-header"><div class="year-badge">' + yr + '</div><div class="year-line"></div></div><div class="timeline">';
    byYear[yr].forEach(function(e, i) {
      html += buildEvent(e, 'ev-' + yr + '-' + i);
    });
    html += '</div></div>';
  });
  wrap.innerHTML = html;
}

var CAT_LABELS = {
  napad: 'Napad i okupacija',
  zlocin: 'Zlo\u010dini i teror',
  otpor: 'Otpor i ustanak',
  politicki: 'Politi\u010dki',
  oslobodenje: 'Oslobo\u0111enje'
};

function buildEvent(e, uid) {
  return '<div class="event cat-' + e.cat + '" id="' + uid + '" onclick="toggle(\'' + uid + '\')">' +
    '<div class="event-card">' +
      '<div class="event-head">' +
        '<div class="event-date">' + e.date + '</div>' +
        '<div class="event-main">' +
          '<div class="event-title">' + e.title + '</div>' +
          '<div class="event-badges"><span class="cat-badge ' + e.cat + '">' + (CAT_LABELS[e.cat]||e.cat) + '</span></div>' +
        '</div>' +
        '<div class="event-arrow">&#9658;</div>' +
      '</div>' +
      '<div class="event-body">' +
        '<div class="event-desc">' + e.desc + '</div>' +
        '<div class="event-meta-grid">' +
          (e.place   ? '<div class="event-meta-item"><div class="event-meta-label">Lokacija</div><div class="event-meta-val">' + e.place + '</div></div>' : '') +
          (e.figures ? '<div class="event-meta-item"><div class="event-meta-label">Klju\u010dne li\u010dnosti</div><div class="event-meta-val">' + e.figures + '</div></div>' : '') +
          (e.result  ? '<div class="event-meta-item"><div class="event-meta-label">Ishod</div><div class="event-meta-val">' + e.result + '</div></div>' : '') +
        '</div>' +
        (e.significance ? '<div class="event-significance">' + e.significance + '</div>' : '') +
      '</div>' +
    '</div></div>';
}

function toggle(uid) {
  var el = document.getElementById(uid);
  if (!el) return;
  var wasOpen = el.classList.contains('open');
  document.querySelectorAll('.event.open').forEach(function(e) { e.classList.remove('open'); });
  if (!wasOpen) el.classList.add('open');
}

render();
</script>
